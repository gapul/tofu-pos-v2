name: tofu_pos
description: "Tofu POS - 学祭向けオフラインPOSシステム"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # 状態管理
  flutter_riverpod: ^3.3.1

  # ルーティング
  go_router: ^17.2.3

  # ローカルDB
  drift: ^2.20.2
  sqlite3: ^3.3.1
  # 各プラットフォーム向けに新しい sqlite3 ネイティブをアプリにバンドルする。
  # 未指定時は OS の system sqlite（特に macOS は古い）を使うことになり、
  # prepared statement reuse パスの内部 race で SIGSEGV が観測されたため、
  # ビルド成果物に同梱されたバージョンに統一して再現性を抑える。
  sqlite3_flutter_libs: ^0.5.42
  path_provider: ^2.1.4
  path: ^1.9.0

  # 軽量保存
  shared_preferences: ^2.3.2

  # 接続状態の検出
  connectivity_plus: ^7.1.1

  # BLE（最後の砦としての選択肢）
  # Central は flutter_blue_plus（Android/iOS 両対応、成熟）。
  flutter_blue_plus: ^2.3.1
  # Peripheral は bluetooth_low_energy（iOS/Android 両対応の GATT Server）。
  bluetooth_low_energy: ^6.0.0

  # ローカルLAN（オフライン副経路）
  bonsoir: ^6.1.0
  web_socket_channel: ^3.0.1
  shelf: ^1.4.1
  shelf_web_socket: ^3.0.0

  # クラウド
  supabase_flutter: ^2.6.0

  # ユーティリティ
  meta: ^1.15.0
  uuid: ^4.5.1
  csv: ^8.0.0
  share_plus: ^13.1.0
  logger: ^2.4.0
  package_info_plus: ^10.1.0

  # アニメーション基盤 (Phase 1)
  # Lottie ベースで Lordicon (CC BY 4.0) JSON を再生する。
  lottie: ^3.1.2
  # widget 単位の declarative なマイクロインタラクション (tap scale 等)。
  flutter_animate: ^4.5.0
  # Material motion (SharedAxis / FadeThrough) を画面遷移に適用するため (PR-3)。
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

  # 単体テストでの SupabaseClient モック等に使用（#13 のため追加）。
  mocktail: ^1.0.4

  # コード生成（drift のみ）
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  # 注意: .env を assets に含めると IPA/APK にバンドルされ、配布物から
  # シークレットを読み取られる経路になる。本番ビルドは必ず --dart-define
  # （または --dart-define-from-file=.env.json）で値を渡す。
  # ローカル開発で .env を使いたい場合は tools/run-dev.sh 経由で起動する。

  # Lordicon (CC BY 4.0) の Lottie JSON を配置。
  # ファイルが無い場合は TofuButton 側で Material Icon にフォールバックする。
  assets:
    - assets/lordicons/

  # 日本語フォントをアプリに同梱する。
  # 同梱しない場合は OS のシステムフォントへフォールバックし、日本語
  # グリフが無い古い Android 端末で文字が豆腐 (□) になる事故が起きた。
  # Noto Sans JP (SIL OFL 1.1) を Regular / Medium / Bold の 3 ウェイトで
  # bundle し、`TofuTokens.fontFamily = 'NotoSansJP'` から参照する。
  # ライセンス全文は `LICENSES/NotoSansJP.LICENSE` に同梱している。
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.otf
        - asset: assets/fonts/NotoSansJP-Medium.otf
          weight: 500
        - asset: assets/fonts/NotoSansJP-Bold.otf
          weight: 700
