name: tofu_pos
description: "Tofu POS - 学祭向けオフラインPOSシステム"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^2.5.1

  # ルーティング
  go_router: ^14.2.7

  # ローカルDB
  drift: ^2.20.2
  sqlite3: ^2.4.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.4
  path: ^1.9.0

  # 軽量保存
  shared_preferences: ^2.3.2

  # 接続状態の検出
  connectivity_plus: ^6.0.5

  # BLE（最後の砦としての選択肢）
  # Central は flutter_blue_plus（Android/iOS 両対応、成熟）。
  flutter_blue_plus: ^1.32.12
  # Peripheral は bluetooth_low_energy（iOS/Android 両対応の GATT Server）。
  bluetooth_low_energy: ^6.0.0

  # ローカルLAN（オフライン副経路）
  bonsoir: ^5.1.10
  web_socket_channel: ^3.0.1
  shelf: ^1.4.1
  shelf_web_socket: ^2.0.0

  # クラウド
  supabase_flutter: ^2.6.0

  # ユーティリティ
  meta: ^1.15.0
  uuid: ^4.5.1
  flutter_dotenv: ^5.2.1
  csv: ^6.0.0
  share_plus: ^10.0.2
  logger: ^2.4.0
  package_info_plus: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^7.0.0

  # コード生成（drift のみ）
  build_runner: ^2.4.13
  drift_dev: ^2.20.3

flutter:
  uses-material-design: true
  assets:
    - .env
