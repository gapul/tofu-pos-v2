name: Deploy dashboard to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/cf-pages-dashboard.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Publish dashboard/ to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard --project-name=tofu-pos-dashboard --branch=main
