name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.1'
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Create empty .env (CI placeholder)
        # Supabase 接続情報は CI では使わないが、pubspec の assets に
        # .env が登録されているのでビルドのためにファイル自体は必要。
        run: |
          touch .env
          echo "SUPABASE_URL=" >> .env
          echo "SUPABASE_ANON_KEY=" >> .env

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
