name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flutter:
    name: Analyze and test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          dart --version

      - name: Resolve dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Format check
        # 生成ファイル（*.g.dart / *.freezed.dart / *.drift.dart）は除外。
        # フォーマット崩れがあれば exit 1 で CI を失敗させる。
        run: |
          dart format --output=none --set-exit-if-changed \
            $(find lib test -type f -name "*.dart" \
              -not -name "*.g.dart" \
              -not -name "*.freezed.dart" \
              -not -name "*.drift.dart")

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
